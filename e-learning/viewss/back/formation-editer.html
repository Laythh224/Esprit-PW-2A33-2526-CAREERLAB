<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Éditer une option — Administration | CareerLab</title>
    <link rel="stylesheet" href="../css/back-layout.css" />
  </head>
  <body>
    <div class="back-shell">
      <aside class="back-sidebar" aria-label="Navigation administration">
        <div class="back-sidebar__brand">
          <strong>CareerLab</strong>
          <small>Back office · e_learning</small>
        </div>
        <ul class="back-nav">
          <li><a href="index.html">Tableau de bord</a></li>
          <li><a href="formations-gestion.html" class="is-active">Optionn</a></li>
          <li><a href="planning-gestion.html">Planning</a></li>
          <li><a href="ressources-gestion.html">Planning_Option</a></li>
          <li><a href="certifications-gestion.html">Structure SQL</a></li>
          <li><a href="index.html">Main page</a></li>
        </ul>
      </aside>
      <div class="back-main">
        <header class="back-topbar">
          <h1>Nouvelle / modifier option</h1>
          <a href="formations-gestion.html" style="font-size: 0.9rem; color: #64748b">← Liste optionn</a>
        </header>
        <div class="back-content">
          <div class="back-card">
            <h2 class="back-card__title" id="optionn-editor-title">Ajouter une option</h2>
            <form id="optionn-back-form">
              <input id="id_option" name="id_option" type="hidden" />
              <div class="form-grid">
              <div class="form-group" style="grid-column: 1 / -1">
                <label for="nom_option">nom_option</label>
                <input id="nom_option" type="text" name="nom_option" placeholder="Ex. Développement web" />
              </div>
              <div class="form-group">
                <label for="specialite">specialite</label>
                <input id="specialite" type="text" name="specialite" placeholder="Ex. Front-end" />
              </div>
              <div class="form-group" style="grid-column: 1 / -1">
                <label for="description">description</label>
                <textarea id="description" name="description" placeholder="Description de l'option"></textarea>
              </div>
              </div>
              <div class="actions-row">
                <button type="submit" class="btn-primary">Enregistrer</button>
                <button id="optionn-cancel-btn" type="button" class="btn-secondary">Annuler</button>
              </div>
            </form>
          </div>
          <p style="font-size: 0.85rem; color: #64748b">
            La liaison avec les plannings se gère via la table <strong>planning_option</strong>.
          </p>
        </div>
      </div>
    </div>
    <script src="../js/optionn-crud.js"></script>
  </body>
</html>
